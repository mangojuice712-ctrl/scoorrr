<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скоринг ИС — Админ-панель</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; min-height: 100vh; }
.sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: #0f172a; display: flex; flex-direction: column; padding: 20px 0; z-index: 20; }
.sidebar-logo { padding: 4px 20px 20px; border-bottom: 1px solid #1e293b; margin-bottom: 12px; }
.sidebar-logo-title { font-size: 14px; font-weight: 700; color: white; }
.sidebar-logo-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 20px; font-size: 13px; color: #94a3b8; cursor: pointer; transition: background .1s, color .1s; border-radius: 0; }
.nav-item:hover { background: #1e293b; color: white; }
.nav-item.active { background: #1e293b; color: white; }
.nav-item-icon { font-size: 15px; width: 18px; text-align: center; }
.main { margin-left: 220px; padding: 28px; min-height: 100vh; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 20px; font-weight: 700; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s, background .15s; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:not(:disabled):hover { background: #2563eb; }
.btn-secondary { background: white; color: #334155; border: 1px solid #e2e8f0; }
.btn-secondary:hover { background: #f8fafc; }
.btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.07); margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.session-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.07); cursor: pointer; transition: box-shadow .15s, transform .1s; border: 2px solid transparent; }
.session-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-1px); }
.session-card.selected { border-color: #3b82f6; }
.sc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.sc-name { font-size: 16px; font-weight: 600; }
.sc-date { font-size: 12px; color: #94a3b8; }
.sc-meta { font-size: 13px; color: #64748b; margin-bottom: 12px; }
.progress-bar-row { display: flex; align-items: center; gap: 8px; }
.pb-wrap { flex: 1; background: #e2e8f0; border-radius: 99px; height: 5px; }
.pb-fill { height: 100%; border-radius: 99px; background: #3b82f6; }
.pb-label { font-size: 12px; color: #64748b; white-space: nowrap; }
.zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.zone-dot.green { background: #16a34a; }
.zone-dot.yellow { background: #d97706; }
.zone-dot.red { background: #dc2626; }
.zone-dot.gray { background: #94a3b8; }
/* Detail panel */
.detail { max-width: 860px; }
.detail-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.detail-back { font-size: 13px; color: #3b82f6; cursor: pointer; padding: 4px 0; }
.detail-back:hover { text-decoration: underline; }
.emp-badge { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; border-radius: 8px; padding: 6px 14px; font-size: 14px; font-weight: 600; }
/* Zone cards */
.score-big { font-size: 52px; font-weight: 800; line-height: 1; }
.score-big.green { color: #16a34a; }
.score-big.yellow { color: #d97706; }
.score-big.red { color: #dc2626; }
.zone-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 700; }
.zone-green { background: #f0fdf4; color: #16a34a; border: 2px solid #16a34a; }
.zone-yellow { background: #fffbeb; color: #d97706; border: 2px solid #d97706; }
.zone-red { background: #fef2f2; color: #dc2626; border: 2px solid #dc2626; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #94a3b8; margin-bottom: 12px; }
.block-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.block-row-name { font-size: 13px; color: #475569; flex: 1; }
.bar-wrap { width: 120px; height: 5px; background: #e2e8f0; border-radius: 99px; flex-shrink: 0; }
.bar-fill { height: 100%; border-radius: 99px; }
.block-row-val { font-size: 13px; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }
.blocker-box { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; }
.blocker-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 3px; }
.blocker-text { font-size: 13px; color: #78350f; line-height: 1.5; }
.rec-box { background: #f8fafc; border-left: 3px solid #3b82f6; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.6; color: #334155; }
/* Respondents list */
.resp-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background .1s; border-radius: 6px; padding: 10px 12px; margin: 0 -12px; }
.resp-item:hover { background: #f8fafc; }
.resp-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #475569; flex-shrink: 0; }
.resp-name { font-size: 14px; font-weight: 500; flex: 1; }
.resp-meta { font-size: 12px; color: #94a3b8; }
.resp-score { font-size: 14px; font-weight: 700; }
.resp-failed { font-size: 12px; color: #dc2626; background: #fef2f2; padding: 2px 8px; border-radius: 4px; }
/* Individual response */
.resp-detail-q { font-size: 13px; color: #475569; margin-bottom: 2px; }
.resp-detail-a { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.ans-0 { color: #dc2626; }
.ans-2 { color: #d97706; }
.ans-4 { color: #16a34a; }
.ans-null { color: #94a3b8; }
/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: white; border-radius: 14px; padding: 28px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal h2 { font-size: 18px; margin-bottom: 6px; }
.modal .sub { color: #64748b; font-size: 14px; margin-bottom: 20px; }
label.fl { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: #475569; }
input[type=text], input[type=number] { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; margin-bottom: 14px; }
input:focus { border-color: #3b82f6; }
.link-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: monospace; color: #334155; word-break: break-all; margin-bottom: 12px; }
.divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }
.tabs { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: #0f172a; border-bottom-color: #0f172a; }
.share-panel { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
.share-panel-title { font-size: 13px; font-weight: 600; color: #166534; margin-bottom: 6px; }
.empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
}
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">Скоринг ИС</div>
    <div class="sidebar-logo-sub">Панель управления</div>
  </div>
  <div class="nav-item active" onclick="showPage('sessions')" id="nav-sessions">
    <span class="nav-item-icon">📋</span> Сессии
  </div>
</div>

<!-- Main -->
<div class="main" id="main-content"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="questions.js"></script>
<script>

// ── State ──────────────────────────────────────────────────────────
// Храним adminKey для созданных сессий в localStorage
function getAdminKeys() {
  try { return JSON.parse(localStorage.getItem('scoring_admin_keys') || '{}'); } catch(e) { return {}; }
}
function saveAdminKey(sessionId, key) {
  const keys = getAdminKeys();
  keys[sessionId] = key;
  localStorage.setItem('scoring_admin_keys', JSON.stringify(keys));
}

let allSessions = [];
let currentView = { page: 'sessions' };

// ── API ───────────────────────────────────────────────────────────

async function fetchSessions() {
  const r = await fetch('/api/sessions');
  const d = await r.json();
  allSessions = d.sessions || [];
}

async function fetchSession(id) {
  const keys = getAdminKeys();
  const adminKey = keys[id] || '';
  const url = adminKey ? `/api/sessions/${id}?adminKey=${adminKey}` : `/api/sessions/${id}`;
  const r = await fetch(url);
  const d = await r.json();
  return d.session;
}

async function createSession(employeeName, expectedCount, createdBy) {
  const r = await fetch('/api/sessions', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ employeeName, expectedCount, createdBy }),
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error);
  saveAdminKey(d.session.id, d.session.adminKey);
  return d.session;
}

async function deleteSession(id) {
  const keys = getAdminKeys();
  const r = await fetch(`/api/sessions/${id}`, {
    method: 'DELETE',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ adminKey: keys[id] }),
  });
  if (!r.ok) throw new Error('Не удалось удалить');
}

// ── Pages ──────────────────────────────────────────────────────────

function showPage(page, ...args) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  currentView = { page, args };
  renderMain();
}

async function renderMain() {
  const el = document.getElementById('main-content');
  if (currentView.page === 'sessions') {
    await fetchSessions();
    el.innerHTML = renderSessionsPage();
  } else if (currentView.page === 'session-detail') {
    const session = await fetchSession(currentView.args[0]);
    el.innerHTML = renderSessionDetail(session, currentView.args[1]);
  }
}

// ── Sessions List ──────────────────────────────────────────────────

function renderSessionsPage() {
  const keys = getAdminKeys();
  const mine = allSessions.filter(s => keys[s.id]);
  const other = allSessions.filter(s => !keys[s.id]);

  return `
  <div class="page-header">
    <h1 class="page-title">Сессии оценки</h1>
    <button class="btn btn-primary" onclick="openCreateModal()">+ Создать сессию</button>
  </div>
  ${mine.length === 0 && other.length === 0 ? `
    <div class="card"><div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px">📋</div>
      <p>Нет активных сессий.<br>Создайте первую — нажмите «Создать сессию».</p>
    </div></div>` : ''}
  ${mine.length > 0 ? `
    <div class="section-label" style="margin-bottom:10px">Мои сессии</div>
    <div class="grid-2">${mine.map(s => renderSessionCard(s, true)).join('')}</div>` : ''}
  ${other.length > 0 ? `
    <div class="section-label" style="margin-top:20px;margin-bottom:10px">Другие сессии</div>
    <div class="grid-2">${other.map(s => renderSessionCard(s, false)).join('')}</div>` : ''}
  `;
}

function renderSessionCard(s, isMine) {
  const pct = s.expectedCount > 0 ? Math.min(100, Math.round(s.responseCount / s.expectedCount * 100)) : null;
  const date = new Date(s.createdAt).toLocaleDateString('ru-RU');
  return `
  <div class="session-card" onclick="showPage('session-detail','${s.id}')">
    <div class="sc-header">
      <div class="sc-name">${escHtml(s.employeeName)}</div>
      ${isMine ? '<span style="font-size:11px;color:#3b82f6;font-weight:600">МОЯ</span>' : ''}
    </div>
    <div class="sc-meta">
      ${s.createdBy ? `Создал: ${escHtml(s.createdBy)} · ` : ''}${date}
    </div>
    <div class="progress-bar-row">
      <div class="pb-wrap">
        <div class="pb-fill" style="width:${pct !== null ? pct : (s.responseCount > 0 ? 50 : 0)}%"></div>
      </div>
      <span class="pb-label">${s.responseCount}${s.expectedCount > 0 ? '/'+s.expectedCount : ''} ответ${plural(s.responseCount,'','а','ов')}</span>
    </div>
  </div>`;
}

// ── Session Detail ──────────────────────────────────────────────────

function renderSessionDetail(session, activeRespondentId) {
  const keys = getAdminKeys();
  const hasKey = !!keys[session.id];
  const responses = session.responses || [];
  const validResponses = responses.filter(r => !r.gateFailed);
  const aggr = validResponses.length > 0 ? calcAggregate(validResponses) : null;
  const surveyUrl = `${location.origin}/survey.html?s=${session.id}`;
  const date = new Date(session.createdAt).toLocaleDateString('ru-RU');

  let activeResp = null;
  if (activeRespondentId && hasKey) {
    activeResp = responses.find(r => r.id === activeRespondentId);
  }

  return `
  <div class="detail">
    <div class="detail-header">
      <span class="detail-back" onclick="showPage('sessions')">← Все сессии</span>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <div class="emp-badge">👤 ${escHtml(session.employeeName)}</div>
      <span style="font-size:13px;color:#94a3b8">${date}</span>
      ${session.createdBy ? `<span style="font-size:13px;color:#94a3b8">· Создал: ${escHtml(session.createdBy)}</span>` : ''}
      ${hasKey ? `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${session.id}')">Удалить</button>` : ''}
    </div>

    <!-- Share link -->
    <div class="share-panel">
      <div class="share-panel-title">🔗 Ссылка для участников</div>
      <div class="link-box" id="survey-link">${surveyUrl}</div>
      <button class="btn btn-secondary btn-sm" onclick="copyLink('${surveyUrl}')">Скопировать ссылку</button>
    </div>

    ${!hasKey ? `<div class="card" style="text-align:center;padding:32px;color:#64748b;font-size:14px">
      <div style="font-size:24px;margin-bottom:8px">🔒</div>
      Полные результаты доступны только создателю сессии.
    </div>` : `

    <!-- Aggregate results -->
    ${aggr ? `
    <div class="card">
      <div class="tabs">
        <div class="tab ${!activeResp?'active':''}" onclick="showPage('session-detail','${session.id}')">Сводные результаты</div>
        ${activeResp ? `<div class="tab active">Ответ: ${escHtml(activeResp.respondentName)}</div>` : ''}
      </div>

      ${!activeResp ? renderAggregate(aggr, responses) : renderIndividualResponse(activeResp)}
    </div>` : `
    <div class="card"><div class="empty-state">
      <div style="font-size:28px;margin-bottom:8px">⏳</div>
      <p>Ещё нет ответов.<br>Поделитесь ссылкой с участниками.</p>
    </div></div>`}

    <!-- Respondents -->
    <div class="card">
      <div class="section-label">Участники (${responses.length}${session.expectedCount > 0 ? '/'+session.expectedCount : ''})</div>
      ${responses.length === 0 ? '<p style="font-size:13px;color:#94a3b8">Нет ответов</p>' :
        responses.map(r => renderRespondentRow(r, session.id, activeRespondentId)).join('')}
    </div>

    `}
  </div>`;
}

function getSignal(aggr) {
  const { zone, scores, blockers } = aggr;
  const dScore = scores['D'];
  const pScore = scores['P'];

  if (zone === 'green') return {
    icon: '✅', color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0',
    title: 'ИС подтверждается',
    text: 'Совокупная оценка команды говорит о том, что сотрудник справляется с ролью. Расставание не обосновано.',
    action: 'Провести финальную встречу, подтвердить прохождение ИС.',
  };

  if (zone === 'red') return {
    icon: '🔴', color: '#dc2626', bg: '#fef2f2', border: '#fecaca',
    title: 'Данные указывают на завершение сотрудничества',
    text: 'Компания соблюла процесс: давала обратную связь, создала условия и дала шанс исправиться — но сотрудник не справился с ожиданиями роли.',
    action: 'Подготовить финальную встречу с HR и лидером. Зафиксировать основания.',
  };

  // Жёлтая зона из-за блокировки (было красное → стало жёлтым)
  if (blockers.length > 0) return {
    icon: '⚠️', color: '#d97706', bg: '#fffbeb', border: '#fde68a',
    title: 'Сначала исправить процесс — затем повторить оценку',
    text: 'Результаты указывают на серьёзные трудности, однако компания не соблюла процедурные требования. Принимать решение об увольнении нельзя.',
    action: blockers.map(b => b.blockingMsg).join(' '),
  };

  // Нативная жёлтая: смотрим на реакцию сотрудника
  if (dScore !== null && dScore >= 50) return {
    icon: '🟡', color: '#d97706', bg: '#fffbeb', border: '#fde68a',
    title: 'Есть признаки роста — рассмотреть продление с планом',
    text: `Результаты пока ниже ожиданий (${pScore ?? '—'}%), но сотрудник реагирует на обратную связь (${dScore}%). Есть основания дать дополнительное время.`,
    action: 'Провести встречу, зафиксировать конкретный план улучшений и дедлайн повторной оценки. После — запустить скоринг заново.',
  };

  return {
    icon: '⚠️', color: '#d97706', bg: '#fffbeb', border: '#fde68a',
    title: 'Слабые результаты без реакции на обратную связь',
    text: `Сотрудник не справляется с ожиданиями (${pScore ?? '—'}%) и не демонстрирует улучшений после обратной связи (${dScore ?? '—'}%).`,
    action: 'Провести прямой разговор о перспективах. Если улучшений не будет — принять решение о расставании.',
  };
}

function getConvergence(responses) {
  const valid = responses.filter(r => !r.gateFailed && r.result?.total !== undefined);
  if (valid.length < 2) return null;
  const scores = valid.map(r => r.result.total);
  const min = Math.min(...scores), max = Math.max(...scores);
  const spread = max - min;
  const label = spread <= 10 ? 'Высокая — команда видит ситуацию одинаково'
               : spread <= 25 ? 'Средняя — есть расхождения во мнениях'
               : 'Низкая — оценки сильно расходятся, нужно обсудить';
  const color = spread <= 10 ? '#16a34a' : spread <= 25 ? '#d97706' : '#dc2626';
  return { min, max, spread, label, color };
}

function renderAggregate(aggr, responses) {
  const zNames = {green:'Зелёная зона', yellow:'Жёлтая зона', red:'Красная зона'};
  const gateFailedCount = responses.filter(r => r.gateFailed).length;
  const signal = getSignal(aggr);
  const conv = getConvergence(responses);

  return `
  <!-- Скор + зона -->
  <div style="display:flex;align-items:flex-end;gap:20px;margin-bottom:20px;flex-wrap:wrap">
    <div>
      <div class="score-big ${aggr.zone}">${aggr.total}</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:2px">из 100 · среднее по ${aggr.count} ответ${plural(aggr.count,'у','ам','ам')}</div>
    </div>
    <div>
      <div class="zone-badge zone-${aggr.zone}">${zNames[aggr.zone]}</div>
      ${aggr.blockers.length ? '<div style="font-size:12px;color:#d97706;margin-top:6px">⚠ Повышена с красной на жёлтую (блокировка)</div>' : ''}
    </div>
  </div>

  <!-- Сигнал: что делать дальше -->
  <div style="background:${signal.bg};border:1.5px solid ${signal.border};border-radius:10px;padding:16px 18px;margin-bottom:16px">
    <div style="font-size:15px;font-weight:700;color:${signal.color};margin-bottom:6px">${signal.icon} ${signal.title}</div>
    <div style="font-size:13px;color:#374151;line-height:1.6;margin-bottom:8px">${signal.text}</div>
    <div style="font-size:13px;font-weight:500;color:${signal.color};border-top:1px solid ${signal.border};padding-top:8px;margin-top:4px">
      → ${signal.action}
    </div>
  </div>

  <!-- Сходимость ответов -->
  ${conv ? `
  <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap">Сходимость</div>
    <div style="font-size:13px;color:${conv.color};font-weight:500">${conv.label}</div>
    <div style="font-size:12px;color:#94a3b8;margin-left:auto">Разброс: ${conv.min}–${conv.max}</div>
  </div>` : ''}
  <div class="divider"></div>
  <div class="section-label">Блоки решения (входят в скор)</div>
  ${BLOCKS.filter(b=>b.scoring).map(b => {
    const s = aggr.scores[b.id];
    const c = scoreColor(s);
    return `<div class="block-row">
      <span class="block-row-name">${b.name} <span style="color:#cbd5e1;font-size:11px">${b.weight}%</span></span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${s??0}%;background:${c}"></div></div>
      <span class="block-row-val" style="color:${c}">${s!==null?s+'%':'—'}</span>
    </div>`;
  }).join('')}

  <div class="divider"></div>
  <div class="section-label">Процессные блоки — предохранители (не входят в скор)</div>
  <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">Если красная зона и любой из этих блоков < 25% → зона повышается до жёлтой</div>
  ${BLOCKS.filter(b=>!b.scoring).map(b => {
    const s = aggr.scores[b.id];
    const c = s !== null && s < 25 && aggr.zone !== 'green' ? '#dc2626' : (s !== null && s < 50 ? '#d97706' : '#16a34a');
    const triggered = aggr.blockers.some(bl => bl.id === b.id);
    return `<div class="block-row">
      <span class="block-row-name">${b.name} ${triggered ? '⚠' : '🔒'}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${s??0}%;background:${c}"></div></div>
      <span class="block-row-val" style="color:${c}">${s!==null?s+'%':'—'}</span>
    </div>`;
  }).join('')}

  ${aggr.blockers.length ? `<div class="divider"></div><div class="section-label">Сработавшие блокировки</div>${aggr.blockers.map(b=>`
    <div class="blocker-box"><div class="blocker-title">«${b.name}» — ${aggr.scores[b.id]}%</div><div class="blocker-text">${b.blockingMsg}</div></div>`).join('')}` : ''}
  ${gateFailedCount > 0 ? `<div style="font-size:12px;color:#94a3b8;margin-top:10px">⚠ ${gateFailedCount} участник${plural(gateFailedCount,'','а','ов')} остановил${gateFailedCount>1?'ись':'ся'} на этапе Gate — не включ${gateFailedCount>1?'ены':'ён'} в расчёт</div>` : ''}
  `;
}

function renderIndividualResponse(resp) {
  if (resp.gateFailed) {
    const failedGate = GATE.find(g => g.id === resp.gateFailedAt);
    return `
    <div style="padding:16px;background:#fef2f2;border-radius:8px;font-size:14px;color:#991b1b">
      <strong>Участник остановился на Gate.</strong><br>
      ${failedGate ? `Вопрос ${resp.gateFailedAt}: «${failedGate.text}» — ответ «Нет»<br>${failedGate.failReason}` : 'Причина не определена'}
    </div>`;
  }
  const result = resp.result;
  const zNames = {green:'Зелёная зона', yellow:'Жёлтая зона', red:'Красная зона'};
  return `
  <div style="display:flex;align-items:flex-end;gap:20px;margin-bottom:16px;flex-wrap:wrap">
    <div>
      <div class="score-big ${result.zone}">${result.total}</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:2px">из 100</div>
    </div>
    <div class="zone-badge zone-${result.zone}">${zNames[result.zone]}</div>
  </div>
  <div class="divider"></div>
  <div class="section-label">Ответы по блокам</div>
  <div style="font-size:12px;color:#94a3b8;margin-bottom:14px">🟦 Блоки решения · 🟡 Процессные блоки</div>
  ${BLOCKS.map(b => {
    const blockScore = result.scores && result.scores[b.id];
    return `
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">${b.name}</span>
        ${!b.scoring ? `<span style="font-size:10px;background:#fef9c3;color:#a16207;padding:1px 6px;border-radius:4px;font-weight:600">процессный</span>` : ''}
        <span style="font-size:12px;color:#94a3b8">${blockScore !== null && blockScore !== undefined ? '— '+blockScore+'%' : ''}</span>
      </div>
      ${b.questions.map(q => {
        if (!isActiveQ(q, resp.answers)) return '';
        const a = resp.answers[q.id];
        const opt = q.options.find(o => o.score === a);
        const cls = a === 0 ? 'ans-0' : a === 2 ? 'ans-2' : a === 4 ? 'ans-4' : 'ans-null';
        return `
        <div style="margin-bottom:10px;padding-left:8px;border-left:2px solid #e2e8f0">
          <div class="resp-detail-q">${q.id} — ${q.text}</div>
          <div class="resp-detail-a ${cls}">${opt ? opt.text : '—'}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}
  `;
}

function isActiveQ(q, answers) {
  if (!q.conditional) return true;
  return q.conditional.showWhenScores.includes(answers[q.conditional.dependsOn]);
}

function renderRespondentRow(r, sessionId, activeId) {
  const result = r.result;
  const scoreStr = r.gateFailed ? '' : (result ? String(result.total) : '?');
  const zone = r.gateFailed ? null : result?.zone;
  const initials = r.respondentName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const time = new Date(r.submittedAt).toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  const isActive = activeId === r.id;
  return `
  <div class="resp-item ${isActive?'active':''}" onclick="showPage('session-detail','${sessionId}','${r.id}')">
    <div class="resp-avatar">${initials}</div>
    <div style="flex:1;min-width:0">
      <div class="resp-name">${escHtml(r.respondentName)}</div>
      <div class="resp-meta">${time}</div>
    </div>
    ${r.gateFailed ? `<span class="resp-failed">Gate ✗</span>` :
      zone ? `<div style="display:flex;align-items:center;gap:6px">
        <div class="zone-dot ${zone}"></div>
        <span class="resp-score" style="color:${scoreColor(result?.total)}">${scoreStr}</span>
      </div>` : ''}
  </div>`;
}

// ── Create Modal ───────────────────────────────────────────────────

function openCreateModal() {
  document.getElementById('modal-content').innerHTML = `
  <h2>Новая сессия</h2>
  <p class="sub">Создайте сессию и поделитесь ссылкой с участниками оценки.</p>
  <label class="fl">Имя оцениваемого сотрудника *</label>
  <input type="text" id="m-employee" placeholder="Юля Петрова">
  <label class="fl">Ожидаемое количество участников</label>
  <input type="number" id="m-count" placeholder="3" min="1" max="20">
  <label class="fl">Ваше имя (кто создаёт)</label>
  <input type="text" id="m-creator" placeholder="Иван Иванов">
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
    <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="doCreate()">Создать</button>
  </div>`;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-employee').focus(), 50);
}

async function doCreate() {
  const name = document.getElementById('m-employee').value.trim();
  const count = document.getElementById('m-count').value;
  const creator = document.getElementById('m-creator').value.trim();
  if (!name) { alert('Укажите имя сотрудника'); return; }
  try {
    const session = await createSession(name, count, creator);
    closeModal();
    openShareModal(session);
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

function openShareModal(session) {
  const url = `${location.origin}/survey.html?s=${session.id}`;
  document.getElementById('modal-content').innerHTML = `
  <h2 style="color:#16a34a">✅ Сессия создана</h2>
  <p class="sub">Поделитесь ссылкой с участниками оценки для <strong>${escHtml(session.employeeName)}</strong>.</p>
  <label class="fl">Ссылка для участников</label>
  <div class="link-box">${url}</div>
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button class="btn btn-primary" onclick="copyLink('${url}')">Скопировать ссылку</button>
    <button class="btn btn-secondary" onclick="closeModal();showPage('sessions')">Готово</button>
  </div>
  <p style="font-size:12px;color:#94a3b8">Каждый участник открывает эту ссылку на своём устройстве и проходит оценку независимо.</p>`;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

async function confirmDelete(sessionId) {
  if (!confirm('Удалить сессию со всеми ответами? Это действие нельзя отменить.')) return;
  try {
    await deleteSession(sessionId);
    showPage('sessions');
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => alert('Ссылка скопирована!')).catch(() => {
    prompt('Скопируйте ссылку:', url);
  });
}

// ── Utils ──────────────────────────────────────────────────────────

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return few;
  return many;
}

// ── Init ──────────────────────────────────────────────────────────
showPage('sessions');
</script>
